services:
  slackbridge-web:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: slackbridge-web
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - slackbridge_data_protection:/root/.aspnet/DataProtection-Keys
    networks:
      - shared_backend

volumes:
  slackbridge_data_protection:
    name: slackbridge_data_protection

networks:
  shared_backend:
    external: true
    name: shared_backend
